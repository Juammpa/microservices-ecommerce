services:
  # 1. Servicio de BD MongoDB - Product
  mongodb:
    image: mongo:7.0.4
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db  # <--- ¡Aquí salvamos los datos!

  # 2. Servicio de BD MySQL - Inventory
  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory-db
    volumes:
      - inventory_data:/var/lib/mysql

  # 3. Servicio de BD PostgreDB - Order
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order-db
    volumes:
      - order_data:/var/lib/postgresql/data


  # ======== Keycloak Base de Datos ==============
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak-db
    volumes:
      - keycloak_data:/var/lib/postgresql/data

# ============ Keycloak Service ===============
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev # Modo desarrollo (rápido y sin HTTPS obligatorio)
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      # Credenciales del Super Admin (Para entrar a la consola ya mismo)
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db

  # ============ RabbitMQ ===============
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Puerto para comunicación entre microservicios
      - "15672:15672" # Puerto para la consola de gestión web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq # <--- ¡La persistencia!

  # ============ Grafana ===============
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
    environment:
      - OTEL_METRIC_EXPORT_INTERVAL=5000

volumes:
  mongo_data:             # Declaramos el volumen persistente
  inventory_data:
  order_data:
  keycloak_data:
  rabbitmq_data:
